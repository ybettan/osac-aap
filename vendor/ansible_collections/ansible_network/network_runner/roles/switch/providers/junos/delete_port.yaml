---
- name: "junos: remove port VLAN configuration"
  junos_command:
    commands:
      - config
      - "delete interfaces {{ port_name }} unit 0 family ethernet-switching"
      - commit
  register: result
  retries: "{{ _retries }}"
  delay: "{{ _delay }}"
  until: result.msg is not defined or result.msg.find(junos_retries_msg) == -1
  connection: network_cli
