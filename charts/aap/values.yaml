aap:
  instance:
    enabled: true
    name: "osac-aap"
    controller:
      disabled: false
    eda:
      disabled: true
    hub:
      disabled: true
    lightspeed:
      disabled: true
    redisMode: standalone
    routeTlsTerminationMechanism: Edge
    imagePullPolicy: IfNotPresent

bootstrap:
  enabled: true
  image: ghcr.io/osac-project/osac-aap:latest
  cliImage: quay.io/openshift/origin-cli:4.20.0
  backoffLimit: 15

configAsCode:
  manifestSecret: "config-as-code-manifest-ig"
  secret: "config-as-code-ig"
  eeImage: ""
  projectGitUri: ""
  projectGitBranch: ""
  importAgentsEnabled: false
  importBcmAgentsEnabled: false
  manifest:
    create: false
    data: {}

importAgents:
  servers: []

importBcmAgents:
  cert: ""
  key: ""

serviceAccounts:
  osacSa: "osac-sa"
  templatePublisher: "template-publisher"

apiToken:
  create: true

instanceGroups:
  clusterFulfillment:
    enabled: false
    config: {}
    secret: {}
  networkFulfillment:
    enabled: false
    config: {}
    secret: {}
  storageFulfillment:
    enabled: false
    config: {}
    secret: {}
  publishTemplates:
    enabled: false
    config:
      OSAC_TEMPLATE_COLLECTIONS: ""
      OSAC_FULFILLMENT_SERVICE_URI: ""
