{{- if .Values.apiToken.create }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "osac-aap.fullname" . }}-create-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-aap.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "15"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "osac-aap.labels" . | nindent 8 }}
    spec:
      initContainers:
      - name: wait-for-aap
        image: {{ .Values.bootstrap.cliImage }}
        command:
          - /bin/bash
          - -c
          - |
            echo "Gateway: ${AAP_GATEWAY_HOSTNAME}"
            echo "Waiting for AAP controller to be ready..."
            for i in {1..60}; do
              echo "Attempt $i: Checking AAP controller readiness..."
              curl -skf http://${AAP_GATEWAY_HOSTNAME}/api/gateway/v1/ping/ \
                | grep -q 'good';
              GATEWAY=$?

              curl -skf http://${AAP_CONTROLLER_GATEWAY_HOSTNAME}/api/v2/ping/ \
                | grep -q 'version';
              CONTROLLER_GATEWAY=$?

              auth_code=$(curl -sk -o /dev/null -w "%{http_code}" -X POST \
                http://${AAP_GATEWAY_HOSTNAME}/api/gateway/v1/tokens/ \
                -d "username=admin&password=dummy")
              [ "$auth_code" != "503" ] && [ "$auth_code" != "000" ];
              AUTH_UPSTREAM=$?

              if [ $GATEWAY -eq 0 ] && [ $CONTROLLER_GATEWAY -eq 0 ] && [ $AUTH_UPSTREAM -eq 0 ];
              then
                echo "AAP controller is ready!"
                exit 0
              fi
              echo "AAP is not ready, waiting 60 seconds..."
              sleep 60
            done
            echo "Timeout waiting for AAP."
            exit 1
        env:
        - name: AAP_GATEWAY_HOSTNAME
          value: {{ include "osac-aap.gatewayHostname" . | quote }}
        - name: AAP_CONTROLLER_GATEWAY_HOSTNAME
          value: {{ include "osac-aap.controllerHostname" . | quote }}
      containers:
      - name: create-token
        image: {{ .Values.bootstrap.cliImage }}
        command:
          - /bin/bash
          - -c
          - |
            set -euo pipefail
            AAP_PASSWORD=$(cat /var/run/secrets/aap-admin/password)
            echo "Creating AAP API token..."
            TOKEN=$(curl -sk -X POST \
              -u "admin:${AAP_PASSWORD}" \
              -H "Content-Type: application/json" \
              -d '{"description": "osac-operator", "scope": "write"}' \
              "http://{{ include "osac-aap.gatewayHostname" . }}/api/gateway/v1/tokens/" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
            [[ -n "${TOKEN}" ]] || { echo "ERROR: Token was empty"; exit 1; }
            echo "Storing token in secret osac-aap-api-token..."
            cat <<YAML | oc apply -f -
            apiVersion: v1
            kind: Secret
            metadata:
              name: osac-aap-api-token
              namespace: {{ .Release.Namespace }}
            type: Opaque
            stringData:
              token: "${TOKEN}"
            YAML
            echo "Token created and stored."
            echo "Restarting operator to pick up new token..."
            oc rollout restart deploy/osac-operator -n {{ .Release.Namespace }}
            oc rollout status deploy/osac-operator -n {{ .Release.Namespace }} --timeout=120s
            echo "Operator restarted."
        volumeMounts:
        - name: aap-admin-password
          mountPath: /var/run/secrets/aap-admin
          readOnly: true
      volumes:
      - name: aap-admin-password
        secret:
          secretName: {{ include "osac-aap.instanceName" . }}-admin-password
      serviceAccountName: {{ .Values.serviceAccounts.osacSa }}
      restartPolicy: Never
{{- end }}
