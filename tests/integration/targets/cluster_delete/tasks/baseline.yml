---
- name: Cluster Delete - Baseline Test
  hosts: localhost
  gather_facts: true
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Read ClusterOrder fixture
      ansible.builtin.set_fact:
        test_cluster_order: "{{ lookup('file', '../../../fixtures/clusterorder-test.yaml') | from_yaml }}"

    - name: Set test variables for baseline workflow
      ansible.builtin.set_fact:
        ansible_eda:
          event:
            payload: "{{ test_cluster_order }}"
        cluster_working_namespace: "cluster-test-cluster-work"
        # NOTE: Using real template (osac.templates.ocp_small from fixture)
        # Override infrastructure-deleting steps to avoid actual resource deletion
        delete_step_hosted_cluster_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml
        delete_step_external_access_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml
        delete_step_cluster_infra_override:
          name: osac.workflows.workflow_helpers
          tasks_from: noop.yml

- name: Import cluster delete workflow (baseline)
  ansible.builtin.import_playbook: osac.workflows.cluster.delete

- name: Verify baseline results
  hosts: localhost
  gather_facts: false
  vars_files:
    - ../../../common_vars.yml

  tasks:
    - name: Verify cluster order name extracted
      ansible.builtin.assert:
        that:
          - cluster_order_name is defined
          - cluster_order_name == "test-cluster"
        fail_msg: "Cluster order name not extracted correctly"

    - name: Verify cluster working namespace determined
      ansible.builtin.assert:
        that:
          - cluster_working_namespace is defined
          - cluster_working_namespace == "cluster-test-cluster-work"
        fail_msg: "Cluster working namespace not set correctly"

    - name: Verify template ID extracted
      ansible.builtin.assert:
        that:
          - template_id is defined
          - template_id == "osac.templates.ocp_small"
        fail_msg: "Template ID not extracted correctly"
