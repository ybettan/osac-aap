  tasks:
    - name: Run invalid-action failure test
      block:
        - name: Attempt with invalid action 'destroy' (expected to fail)
          ansible.builtin.include_role:
            name: osac.service.storage_provider
          vars:
            storage_provider_tiers:
              - name: default
                protocol: nfs
                provider: vast
            storage_provider_action: destroy
            tenant_name: "tenant-acme"
            tenant_namespace: "osac-tenants"

        - name: This task should not be reached -- role should have failed
          ansible.builtin.fail:
            msg: "Role did not fail as expected when action is invalid"

      rescue:
        - name: Verify role failed with expected invalid-action message
          ansible.builtin.assert:
            that:
              - "'destroy' in (ansible_failed_result.msg | default(''))"
              - "'setup' in (ansible_failed_result.msg | default('')) or 'must be one of' in (ansible_failed_result.msg | default(''))"
            fail_msg: "Role failed but with unexpected message: {{ ansible_failed_result.msg | default('unknown') }}"
            success_msg: "Role correctly rejected invalid input"

# ──────────────────────────────────────────────────────────────
