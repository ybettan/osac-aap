      rescue:
        - name: Verify role failed with expected duplicate-names message
          ansible.builtin.assert:
            that:
              - "'duplicate tier names' in ansible_failed_result.msg"
            fail_msg: "Role failed but with unexpected message: {{ ansible_failed_result.msg | default('unknown') }}"
            success_msg: "Role correctly rejected invalid input"

# ──────────────────────────────────────────────────────────────
# Test 9: Invalid DNS label tier name -- error path
# Expected: role fails with DNS label validation message
# ──────────────────────────────────────────────────────────────
