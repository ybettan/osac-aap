---
- name: Load configuration variables
  ansible.builtin.include_vars:
    dir: vars/

- name: Configure project SCM and merge into controller projects
  ansible.builtin.include_tasks: configure_project_scm.yml

- name: OSAC AAP
  ansible.builtin.include_role:
    name: infra.aap_configuration.dispatch
  vars:
    aap_configuration_dispatcher_exclude_roles:
      - eda_credential_types
      - eda_credentials
      - eda_credential_input_sources
      - eda_controller_tokens
      - eda_projects
      - eda_event_streams
      - eda_decision_environments
      - eda_rulebook_activations
