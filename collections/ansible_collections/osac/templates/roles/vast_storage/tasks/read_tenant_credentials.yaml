---
# Reads per-tenant VMS Manager credentials from the hub-cluster tenant config Secret.
# This is NOT the admin credentials reader (read_credentials.yaml reads admin creds from env vars).
# This file reads the per-tenant Manager username/password generated during setup.
# The CSI driver authenticates via username/password, not API tokens.
#
# CALLER CONTRACT: After using this file, callers MUST clear these facts in their always block:
#   _vast_tenant_csi_username, _vast_tenant_csi_password, _vast_tenant_vip_pool,
#   _vast_tenant_endpoint, _vast_view_policy_name, _vast_view_policy_names,
#   _vast_view_policy_names_raw, _vast_tenant_block_encryption_passphrase,
#   _vast_tenant_uid_hash
# Failure to clear leaves credentials in play-scoped facts for the remainder of the play.
#
# Requires:
#   tenant_name                              — play-level var
#   vast_storage_tenant_config_secret_prefix — from defaults
#   vast_storage_config_namespace            — from defaults
#
# Sets output facts (caller clears in always block):
#   _vast_tenant_id
#   _vast_tenant_uid_hash
#   _vast_tenant_csi_username
#   _vast_tenant_csi_password
#   _vast_tenant_vip_pool
#   _vast_tenant_endpoint
#   _vast_view_policy_name
#   _vast_tenant_block_encryption_passphrase

- name: Read tenant config Secret from hub cluster
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ vast_storage_tenant_config_secret_prefix }}{{ tenant_name }}"
    namespace: "{{ vast_storage_config_namespace }}"
  register: _vast_tenant_config_secret
  no_log: true

- name: Fail if tenant config Secret does not exist
  ansible.builtin.fail:
    msg: >-
      Tenant config Secret '{{ vast_storage_tenant_config_secret_prefix }}{{ tenant_name }}'
      not found in namespace '{{ vast_storage_config_namespace }}'.
      Run setup for this tenant before calling ensure_storage_class.
  when: _vast_tenant_config_secret.resources | length == 0

- name: Fail if tenant config Secret is missing manager credentials
  ansible.builtin.fail:
    msg: >-
      Hub Secret for tenant '{{ tenant_name }}' does not contain per-tenant manager
      credentials (tenant_manager_username or tenant_manager_password is missing or empty).
      Re-run setup to create a per-tenant VMS Manager.
      Do NOT fall back to admin credentials — that would reintroduce the security
      vulnerability this architecture eliminates.
  when: >-
    _vast_tenant_config_secret.resources[0].data.tenant_manager_username is not defined
    or (_vast_tenant_config_secret.resources[0].data.tenant_manager_username | b64decode | length) == 0
    or _vast_tenant_config_secret.resources[0].data.tenant_manager_password is not defined
    or (_vast_tenant_config_secret.resources[0].data.tenant_manager_password | b64decode | length) == 0

- name: Extract per-tenant credentials and config from hub Secret
  ansible.builtin.set_fact:
    _vast_tenant_id: "{{ _vast_tenant_config_secret.resources[0].data.vast_tenant_id | b64decode }}"
    _vast_tenant_csi_username: "{{ _vast_tenant_config_secret.resources[0].data.tenant_manager_username | b64decode }}"
    _vast_tenant_csi_password: "{{ _vast_tenant_config_secret.resources[0].data.tenant_manager_password | b64decode }}"
    _vast_tenant_vip_pool: "{{ _vast_tenant_config_secret.resources[0].data.vip_pool_name | b64decode }}"
    _vast_tenant_endpoint: "{{ _vast_tenant_config_secret.resources[0].data.vast_endpoint | b64decode }}"
    _vast_view_policy_name: "{{ _vast_tenant_config_secret.resources[0].data.view_policy_name | default('') | b64decode }}"
    _vast_tenant_block_encryption_passphrase: "{{ _vast_tenant_config_secret.resources[0].data.block_encryption_passphrase | default('') | b64decode | default('', true) }}"
    _vast_view_policy_names_raw: "{{ _vast_tenant_config_secret.resources[0].data.view_policy_names | default('') | b64decode | default('', true) }}"
  no_log: true

- name: Read tenant UID hash from hub Secret
  ansible.builtin.set_fact:
    _vast_tenant_uid_hash: "{{ _vast_tenant_config_secret.resources[0].data.tenant_uid_hash | b64decode }}"

- name: Parse per-protocol view policy names when available
  ansible.builtin.set_fact:
    _vast_view_policy_names: >-
      {{ _vast_view_policy_names_raw if (_vast_view_policy_names_raw is mapping)
         else (_vast_view_policy_names_raw | from_json) }}
  when: _vast_view_policy_names_raw | length > 0
  no_log: true

- name: Log view policy name status
  ansible.builtin.debug:
    msg: "View policy from hub Secret: {{ _vast_view_policy_name | default('not set — will be created by ensure_storage_class') }}"

- name: Clear raw tenant config Secret object from facts
  ansible.builtin.set_fact:
    _vast_tenant_config_secret: {}
