---
- name: Fail if host class is not openstack
  ansible.builtin.fail:
    msg: "bm_host_private_network requires hostClass 'openstack', got '{{ bare_metal_instance.spec.hostClass | default('') }}'"
  when: bare_metal_instance.spec.hostClass | default('') != "openstack"

- name: Fail if network class is not openstack
  ansible.builtin.fail:
    msg: "bm_host_private_network requires networkClass 'openstack', got '{{ bare_metal_instance.spec.networkClass | default('') }}'"
  when: bare_metal_instance.spec.networkClass | default('') != "openstack"

- name: Parse template parameters
  ansible.builtin.set_fact:
    template_params: "{{ bare_metal_instance.spec.templateParameters | default('{}') | from_json }}"

- name: Detach node from private network
  ansible.builtin.include_role:
    name: osac.esi.l2
    tasks_from: set_networks_for_node
  vars:
    node: "{{ bare_metal_instance.spec.externalHostID }}"
    networks: []

- name: Attach node to network after detach
  when: template_params.networkAfterDelete | default('') | length > 0
  block:
    - name: Wait for network to exist
      openstack.cloud.networks_info:
        name: "{{ template_params.networkAfterDelete }}"
      register: private_network_check
      until: private_network_check.networks | length > 0
      retries: 30
      delay: 10

    - name: Attach node to network
      ansible.builtin.include_role:
        name: osac.esi.l2
        tasks_from: set_networks_for_node
      vars:
        node: "{{ bare_metal_instance.spec.externalHostID }}"
        networks: "{{ [template_params.networkAfterDelete] }}"

- name: Network detachment completed
  ansible.builtin.debug:
    msg: >-
      Node {{ bare_metal_instance.spec.externalHostID }} detached from private network
      {{ (template_params.networkAfterDelete is defined)
         | ternary('and attached to ' ~ template_params.networkAfterDelete | default(''), '') }}
